<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" a href="style.css"> 
     <link rel="preconnect" href="https://fonts.googleapis.com">

</head>
<body>

<nav>
    <div class="brand-container">
        <a href="index.html" class="wp-logo">
            <span class="wp-text">WP</span>
        </a>
        <h1>Wishlist Pantry</h1>
    </div>     
    
    <ul>
        <li><a href="about.html">About</a></li>
        <li class="separator">|</li>
        <li><a href="profile.html" class="active">Profile</a></li>
    </ul>
</nav>

<section class="input-section">
    <form id="item-form">
        <h3>Add to wishlist</h3>
        <div class="input-group">
            <label for="itemName">Item Name:</label>
            <input type="text" id="itemName" placeholder="What is it called?" required>
        </div>

        <div class="input-group">
            <label for="itemLink">Link to Item:</label>
            <input type="url" id="itemLink" placeholder="https://..." required>
        </div>

        <div class="input-group">
            <label for="price">Price:</label>
            <input type="number" id="itemPrice" placeholder="Ksh ..." required>
        </div>

        <div class="input-group">
            <label for="itemStandout">Why it stands out? / why you want it:</label>
            <textarea id="itemStandout" placeholder="Why is this special?"></textarea>
        </div>

        <div class="input-group">
            <label for="itemCategory">Category:</label>
            <input type="text" id="itemCategory" list="category-suggestions" placeholder="e.g., Tech, Decor, Books">
            <datalist id="category-suggestions">
                <option value="Tech">
                <option value="Home">
                <option value="Education">
            </datalist>
        </div>

        <button type="submit" id="save-btn">Add to Collection</button>
    </form>
</section><hr>
   <div id="item-container">
    </div>
<script src="script.js"></script>    
</body>
</html>
